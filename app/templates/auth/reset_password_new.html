{% extends "base.html" %}
{% block title %}Set New Password | PhysiHome{% endblock %}
{% block content %}
<section class="auth-card card">
  <header class="auth-header">
    <h1>Choose a new password</h1>
    <p>Set a strong password for <strong>{{ email }}</strong>.</p>
  </header>

  {% if error %}
  <div class="alert error">{{ error }}</div>
  {% endif %}

  <form class="stack" method="post" action="/api/auth/reset-password">
    <input type="hidden" name="email" value="{{ email }}" />
    <label>
      New password
      <div style="position:relative;">
        <input
          type="password"
          name="password"
          placeholder="Create a strong password"
          autocomplete="new-password"
          required
          minlength="8"
        />
        <button type="button" class="password-toggle" onclick="togglePassword(this)" aria-label="Show password" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:4px; display:flex; align-items:center; justify-content:center; width:28px; height:28px;">
          <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px; height:20px;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-slash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:20px; height:20px; display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </label>
    <button class="btn primary" type="submit">Update password</button>
  </form>

  <p class="small">
    Back to
    <a href="/login">login</a>
  </p>
</section>
{% endblock %}
